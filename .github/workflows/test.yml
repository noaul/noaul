name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck
      - name: Run tests
        shell: pwsh
        run: Invoke-Pester ./tests/ -Output Detailed -CI
